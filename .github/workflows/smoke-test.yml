name: smoke-test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      nativeVersion:
        description: 'Native artifact version to test (e.g. 5.4.12-2.0.4-x9)'
        required: true
        default: '5.4.12-2.0.4-x9'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  smoke:
    name: ${{ matrix.platform }} on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-24.04
            platform: linux-x86_64-baseline
          - os: linux
            runner: ubuntu-24.04
            platform: linux-x86_64-avx2
          - os: linux
            runner: ubuntu-24.04
            platform: linux-x86_64
          - os: linux
            runner: ubuntu-24.04-arm
            platform: linux-arm64-baseline
          - os: linux
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: windows
            runner: windows-latest
            platform: windows-x86_64-baseline
          - os: windows
            runner: windows-latest
            platform: windows-x86_64

    env:
      NATIVE_VERSION: ${{ github.event.inputs.nativeVersion || '5.4.12-2.0.4-x9' }}
      DETECTED_PLATFORM: ${{ matrix.platform }}
      GITHUB_SHA: ${{ github.sha }}
      RUNNER_OS: ${{ matrix.os }}
      CPU_MODEL: unknown
      CPU_FLAGS: unknown

    steps:
      - name: Set runner architecture
        run: echo "RUNNER_ARCH=${{ runner.arch }}" >> "$GITHUB_ENV"

      - name: Checkout test project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Resolve effective native version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.nativeVersion || '5.4.12-2.0.4-x9' }}"
          echo "nativeVersion=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Collect CPU information (Linux)
        if: matrix.os == 'linux'
        run: |
          MODEL=$(grep -m1 'model name' /proc/cpuinfo | sed 's/^.*: //' || echo 'unknown')
          FLAGS=$(grep -m1 '^flags' /proc/cpuinfo | sed 's/^.*: //' || grep -m1 '^Features' /proc/cpuinfo | sed 's/^.*: //' || echo 'unknown')
          echo "CPU_MODEL=$MODEL" >> "$GITHUB_ENV"
          echo "CPU_FLAGS=$FLAGS" >> "$GITHUB_ENV"
          echo "CPU model: $MODEL"
          echo "CPU flags: $FLAGS"

      - name: Collect CPU information (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $model = (Get-CimInstance Win32_Processor).Name
          if (-not $model) { $model = 'unknown' }
          "CPU_MODEL=$model" >> $env:GITHUB_ENV
          "CPU_FLAGS=unknown" >> $env:GITHUB_ENV
          Write-Host "CPU model: $model"

      - name: Check CPU support for ${{ matrix.platform }}
        if: matrix.os == 'linux'
        id: cpu-check
        run: |
          PLATFORM="${{ matrix.platform }}"
          case "$PLATFORM" in
            linux-x86_64)
              if ! grep -m1 '^flags' /proc/cpuinfo | grep -qw 'avx512f'; then
                echo "SKIPPED=true" >> "$GITHUB_OUTPUT"
                echo "::warning::CPU does not support AVX-512; skipping $PLATFORM smoke tests."
              fi
              ;;
            linux-x86_64-avx2)
              if ! grep -m1 '^flags' /proc/cpuinfo | grep -qw 'avx2'; then
                echo "SKIPPED=true" >> "$GITHUB_OUTPUT"
                echo "::warning::CPU does not support AVX2; skipping $PLATFORM smoke tests."
              fi
              ;;
            linux-arm64)
              if ! grep -m1 '^Features' /proc/cpuinfo | grep -qw 'sve2'; then
                echo "SKIPPED=true" >> "$GITHUB_OUTPUT"
                echo "::warning::CPU does not support SVE2; skipping $PLATFORM smoke tests."
              fi
              ;;
          esac

      - name: Run smoke tests for ${{ matrix.platform }}
        if: steps.cpu-check.outputs.SKIPPED != 'true'
        run: |
          set -euo pipefail
          mvn -B test \
            -Dnative.version=${{ steps.version.outputs.nativeVersion }} \
            -Djavacpp.platform=${{ matrix.platform }}

      - name: Skip smoke tests for ${{ matrix.platform }}
        if: steps.cpu-check.outputs.SKIPPED == 'true'
        run: |
          echo "Smoke tests for ${{ matrix.platform }} skipped due to missing CPU features."

      - name: Upload test reports
        if: always() && steps.cpu-check.outputs.SKIPPED != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: surefire-reports-${{ matrix.platform }}
          path: target/surefire-reports/

      - name: Upload benchmark raw result
        if: always() && steps.cpu-check.outputs.SKIPPED != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-raw-${{ matrix.platform }}
          path: target/benchmark-results/
          if-no-files-found: warn

  report:
    name: Aggregate performance report
    needs: smoke
    runs-on: ubuntu-24.04
    if: always() && !cancelled() && needs.smoke.result != 'skipped'
    steps:
      - name: Checkout test project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download all benchmark raw results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: benchmark-raw
          pattern: benchmark-raw-*

      - name: Generate performance report
        run: |
          python3 .github/scripts/generate-performance-report.py \
            benchmark-raw \
            target/performance-report/index.html \
            "${NATIVE_VERSION}" \
            "${GITHUB_SHA}"
        env:
          NATIVE_VERSION: ${{ github.event.inputs.nativeVersion || '5.4.12-2.0.4-x9' }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Generate performance summary SVG
        run: |
          python3 .github/scripts/generate-performance-svg.py \
            benchmark-raw \
            target/performance-report/performance-summary.svg \
            "${NATIVE_VERSION}" \
            "${GITHUB_SHA}"
        env:
          NATIVE_VERSION: ${{ github.event.inputs.nativeVersion || '5.4.12-2.0.4-x9' }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: performance-report
          path: target/performance-report/
          if-no-files-found: error

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/performance-report/

  deploy:
    name: Deploy performance report to Pages
    needs: report
    runs-on: ubuntu-24.04
    if: always() && !cancelled() && needs.report.result == 'success' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
