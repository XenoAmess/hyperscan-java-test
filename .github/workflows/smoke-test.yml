name: smoke-test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      nativeVersion:
        description: 'Native artifact version to test (leave empty to use native.version from pom.xml)'
        required: false
      platforms:
        description: 'Comma-separated platform subset to run (empty = full matrix, e.g. "linux-x86_64,linux-arm64")'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

jobs:
  setup:
    name: Resolve test matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
    steps:
      - name: Resolve matrix
        id: matrix
        shell: bash
        env:
          PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          python3 - <<'EOF'
          import json, os
          full = [
              {"os": "linux", "runner": "ubuntu-24.04", "platform": "linux-x86_64-baseline"},
              {"os": "linux", "runner": "ubuntu-24.04", "platform": "linux-x86_64-avx2"},
              {"os": "linux", "runner": "ubuntu-24.04", "platform": "linux-x86_64"},
              {"os": "linux", "runner": "ubuntu-24.04-arm", "platform": "linux-arm64-baseline"},
              {"os": "linux", "runner": "ubuntu-24.04-arm", "platform": "linux-arm64"},
              {"os": "windows", "runner": "windows-latest", "platform": "windows-x86_64-baseline"},
              {"os": "windows", "runner": "windows-latest", "platform": "windows-x86_64"},
          ]
          wanted = [p.strip() for p in os.environ.get("PLATFORMS", "").split(",") if p.strip()]
          if wanted:
              known = {c["platform"] for c in full}
              unknown = [p for p in wanted if p not in known]
              if unknown:
                  raise SystemExit(f"unknown platforms: {unknown}")
              cells = [c for c in full if c["platform"] in wanted]
          else:
              cells = full
          print(f"matrix cells: {[c['platform'] for c in cells]}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("value=" + json.dumps({"include": cells}) + "\n")
          EOF
  smoke:
    name: ${{ matrix.platform }} on ${{ matrix.runner }}
    needs: setup
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    env:
      DETECTED_PLATFORM: ${{ matrix.platform }}
      GITHUB_SHA: ${{ github.sha }}
      RUNNER_OS: ${{ matrix.os }}
      CPU_MODEL: unknown
      CPU_FLAGS: unknown

    steps:
      - name: Set runner architecture
        run: echo "RUNNER_ARCH=${{ runner.arch }}" >> "$GITHUB_ENV"

      - name: Checkout test project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false

      # LFS data files (~55 MB) are only needed by the vectorscan functional
      # tests. With lfs:false the checkout leaves pointer files whose content
      # is the stable LFS oid, so the cache key only changes when the actual
      # data changes; on a hit we skip the LFS download entirely (per-run
      # fetches were exhausting the account LFS bandwidth budget).
      - name: Cache LFS data files
        id: lfs-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: src/test/resources/vectorscan/datafiles
          key: lfs-datafiles-${{ hashFiles('src/test/resources/vectorscan/datafiles/*.txt') }}

      - name: Fetch LFS objects on cache miss
        if: steps.lfs-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          if ! git lfs pull; then
            echo "::warning::git lfs pull failed (LFS budget exhausted?); falling back to upstream vectorscan sources"
            BASE="https://raw.githubusercontent.com/VectorCamp/vectorscan/vectorscan/5.4.12/unit/hyperscan/datafiles"
            for f in leipzig-3200.txt lh3lh3-reb-howto.txt; do
              POINTER_FILE="src/test/resources/vectorscan/datafiles/$f"
              EXPECTED=$(grep -oP 'oid sha256:\K[0-9a-f]+' "$POINTER_FILE")
              curl -fsSL "$BASE/$f" -o "$POINTER_FILE"
              echo "$EXPECTED  $POINTER_FILE" | sha256sum -c
            done
          fi

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Resolve effective native version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.nativeVersion }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(sed -n 's:.*<native\.version>\(.*\)</native\.version>.*:\1:p' pom.xml | head -n1)
          fi
          echo "nativeVersion=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Collect CPU information (Linux)
        if: matrix.os == 'linux'
        run: |
          MODEL=$(grep -m1 'model name' /proc/cpuinfo | sed 's/^.*: //' || echo '')
          if [ -z "$MODEL" ]; then
            IMPL=$(grep -m1 'CPU implementer' /proc/cpuinfo | sed 's/^.*: //' || echo '')
            PART=$(grep -m1 'CPU part' /proc/cpuinfo | sed 's/^.*: //' || echo '')
            VARIANT=$(grep -m1 'CPU variant' /proc/cpuinfo | sed 's/^.*: //' || echo '')
            ARCH=$(grep -m1 'CPU architecture' /proc/cpuinfo | sed 's/^.*: //' || echo '')
            if [ -n "$IMPL" ] && [ -n "$PART" ]; then
              MODEL="ARM implementer=${IMPL} part=${PART} variant=${VARIANT} arch=${ARCH}"
            fi
          fi
          if [ -z "$MODEL" ]; then
            MODEL='unknown'
          fi
          FLAGS=$(grep -m1 '^flags' /proc/cpuinfo | sed 's/^.*: //' || grep -m1 '^Features' /proc/cpuinfo | sed 's/^.*: //' || echo 'unknown')
          echo "CPU_MODEL=$MODEL" >> "$GITHUB_ENV"
          echo "CPU_FLAGS=$FLAGS" >> "$GITHUB_ENV"
          echo "CPU model: $MODEL"
          echo "CPU flags: $FLAGS"

      - name: Collect CPU information (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $model = (Get-CimInstance Win32_Processor).Name.Trim()
          if (-not $model) { $model = 'unknown' }
          "CPU_MODEL=$model" >> $env:GITHUB_ENV
          "CPU_FLAGS=unknown" >> $env:GITHUB_ENV
          Write-Host "CPU model: $model"

      - name: Check CPU support for ${{ matrix.platform }}
        if: matrix.os == 'linux'
        id: cpu-check
        run: |
          PLATFORM="${{ matrix.platform }}"
          case "$PLATFORM" in
            linux-x86_64)
              if ! grep -m1 '^flags' /proc/cpuinfo | grep -qw 'avx512f'; then
                echo "SKIPPED=true" >> "$GITHUB_OUTPUT"
                echo "MISSING_FEATURE=avx512f" >> "$GITHUB_OUTPUT"
                echo "::warning::CPU does not support AVX-512; flagging for retry."
              fi
              ;;
            linux-x86_64-avx2)
              if ! grep -m1 '^flags' /proc/cpuinfo | grep -qw 'avx2'; then
                echo "SKIPPED=true" >> "$GITHUB_OUTPUT"
                echo "MISSING_FEATURE=avx2" >> "$GITHUB_OUTPUT"
                echo "::warning::CPU does not support AVX2; flagging for retry."
              fi
              ;;
            linux-arm64)
              if ! grep -m1 '^Features' /proc/cpuinfo | grep -qw 'sve2'; then
                echo "SKIPPED=true" >> "$GITHUB_OUTPUT"
                echo "MISSING_FEATURE=sve2" >> "$GITHUB_OUTPUT"
                echo "::warning::CPU does not support SVE2; flagging for retry."
              fi
              ;;
          esac

      - name: Run smoke tests for ${{ matrix.platform }}
        if: steps.cpu-check.outputs.SKIPPED != 'true'
        run: |
          set -euo pipefail
          mvn -B -U test \
            -Dnative.version=${{ steps.version.outputs.nativeVersion }} \
            -Djavacpp.platform=${{ matrix.platform }} \
            -Dhyperscan.benchmarks.enabled=false \
            -Dhyperscan.benchmarks.large.enabled=true \
            -Dbenchmark.platform=${{ matrix.platform }}

      - name: Skip smoke tests for ${{ matrix.platform }}
        if: steps.cpu-check.outputs.SKIPPED == 'true'
        run: |
          echo "Smoke tests for ${{ matrix.platform }} skipped due to missing CPU features."

      - name: Upload test reports
        if: always() && steps.cpu-check.outputs.SKIPPED != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: surefire-reports-${{ matrix.platform }}
          path: target/surefire-reports/

  benchmark:
    name: Benchmark ${{ matrix.platform }}
    needs: setup
    runs-on: ${{ matrix.runner }}
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    env:
      DETECTED_PLATFORM: ${{ matrix.platform }}
      GITHUB_SHA: ${{ github.sha }}
      RUNNER_OS: ${{ matrix.os }}
      CPU_MODEL: unknown
      CPU_FLAGS: unknown

    steps:
      - name: Set runner architecture
        run: echo "RUNNER_ARCH=${{ runner.arch }}" >> "$GITHUB_ENV"

      - name: Checkout test project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Resolve effective native version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.nativeVersion }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(sed -n 's:.*<native\.version>\(.*\)</native\.version>.*:\1:p' pom.xml | head -n1)
          fi
          echo "nativeVersion=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Collect CPU information (Linux)
        if: matrix.os == 'linux'
        run: |
          MODEL=$(grep -m1 'model name' /proc/cpuinfo | sed 's/^.*: //' || echo '')
          if [ -z "$MODEL" ]; then
            IMPL=$(grep -m1 'CPU implementer' /proc/cpuinfo | sed 's/^.*: //' || echo '')
            PART=$(grep -m1 'CPU part' /proc/cpuinfo | sed 's/^.*: //' || echo '')
            VARIANT=$(grep -m1 'CPU variant' /proc/cpuinfo | sed 's/^.*: //' || echo '')
            ARCH=$(grep -m1 'CPU architecture' /proc/cpuinfo | sed 's/^.*: //' || echo '')
            if [ -n "$IMPL" ] && [ -n "$PART" ]; then
              MODEL="ARM implementer=${IMPL} part=${PART} variant=${VARIANT} arch=${ARCH}"
            fi
          fi
          if [ -z "$MODEL" ]; then
            MODEL='unknown'
          fi
          FLAGS=$(grep -m1 '^flags' /proc/cpuinfo | sed 's/^.*: //' || grep -m1 '^Features' /proc/cpuinfo | sed 's/^.*: //' || echo 'unknown')
          echo "CPU_MODEL=$MODEL" >> "$GITHUB_ENV"
          echo "CPU_FLAGS=$FLAGS" >> "$GITHUB_ENV"
          echo "CPU model: $MODEL"
          echo "CPU flags: $FLAGS"

      - name: Collect CPU information (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $model = (Get-CimInstance Win32_Processor).Name.Trim()
          if (-not $model) { $model = 'unknown' }
          "CPU_MODEL=$model" >> $env:GITHUB_ENV
          "CPU_FLAGS=unknown" >> $env:GITHUB_ENV
          Write-Host "CPU model: $model"

      - name: Check CPU support for ${{ matrix.platform }}
        if: matrix.os == 'linux'
        id: cpu-check
        run: |
          PLATFORM="${{ matrix.platform }}"
          case "$PLATFORM" in
            linux-x86_64)
              if ! grep -m1 '^flags' /proc/cpuinfo | grep -qw 'avx512f'; then
                echo "SKIPPED=true" >> "$GITHUB_OUTPUT"
                echo "MISSING_FEATURE=avx512f" >> "$GITHUB_OUTPUT"
                echo "::warning::CPU does not support AVX-512; flagging for retry."
              fi
              ;;
            linux-x86_64-avx2)
              if ! grep -m1 '^flags' /proc/cpuinfo | grep -qw 'avx2'; then
                echo "SKIPPED=true" >> "$GITHUB_OUTPUT"
                echo "MISSING_FEATURE=avx2" >> "$GITHUB_OUTPUT"
                echo "::warning::CPU does not support AVX2; flagging for retry."
              fi
              ;;
            linux-arm64)
              if ! grep -m1 '^Features' /proc/cpuinfo | grep -qw 'sve2'; then
                echo "SKIPPED=true" >> "$GITHUB_OUTPUT"
                echo "MISSING_FEATURE=sve2" >> "$GITHUB_OUTPUT"
                echo "::warning::CPU does not support SVE2; flagging for retry."
              fi
              ;;
          esac

      - name: Run JMH benchmarks for JAVACPP on ${{ matrix.platform }}
        if: steps.cpu-check.outputs.SKIPPED != 'true'
        run: |
          for attempt in 1 2 3; do
            if mvn -B -U test \
              -Dtest=JmhBenchmarkRunner \
              -Dnative.version=${{ steps.version.outputs.nativeVersion }} \
              -Djavacpp.platform=${{ matrix.platform }} \
              -Dhyperscan.benchmarks.enabled=true \
              -Dhyperscan.benchmark.implementation=JAVACPP \
              -Dhyperscan.benchmarks.large.enabled=true \
              -Dbenchmark.platform=${{ matrix.platform }}; then
              exit 0
            fi
            echo "::warning::JAVACPP benchmark attempt $attempt failed; retrying in 30s"
            sleep 30
          done
          echo "::error::JAVACPP benchmark failed after 3 attempts"
          exit 1

      - name: Run JMH benchmarks for PANAMA on ${{ matrix.platform }}
        if: steps.cpu-check.outputs.SKIPPED != 'true'
        run: |
          for attempt in 1 2 3; do
            if mvn -B -U test \
              -Dtest=JmhBenchmarkRunner \
              -Dnative.version=${{ steps.version.outputs.nativeVersion }} \
              -Djavacpp.platform=${{ matrix.platform }} \
              -Dhyperscan.benchmarks.enabled=true \
              -Dhyperscan.benchmark.implementation=PANAMA \
              -Dhyperscan.benchmarks.large.enabled=true \
              -Dbenchmark.platform=${{ matrix.platform }}; then
              exit 0
            fi
            echo "::warning::PANAMA benchmark attempt $attempt failed; retrying in 30s"
            sleep 30
          done
          echo "::error::PANAMA benchmark failed after 3 attempts"
          exit 1

      # Upstream (com.gliwka.hyperscan:native) has no tier variants and no
      # windows-x86_64 classifier. On Linux it runs on every tier's runner with
      # the base platform classifier; results are still attributed to the
      # current matrix tier via -Dbenchmark.platform.
      - name: Run JMH benchmarks for UPSTREAM on ${{ matrix.platform }}
        if: steps.cpu-check.outputs.SKIPPED != 'true' && matrix.os == 'linux'
        run: |
          BASE_PLATFORM="${{ matrix.platform }}"
          BASE_PLATFORM="${BASE_PLATFORM%-avx2}"
          BASE_PLATFORM="${BASE_PLATFORM%-baseline}"
          for attempt in 1 2 3; do
            if mvn -B -U test \
              -Dtest=JmhBenchmarkRunner \
              -Dnative.flavor=gliwka \
              -Djavacpp.platform=$BASE_PLATFORM \
              -Dhyperscan.benchmarks.enabled=true \
              -Dhyperscan.benchmark.implementation=UPSTREAM \
              -Dhyperscan.benchmarks.large.enabled=true \
              -Dbenchmark.platform=${{ matrix.platform }}; then
              exit 0
            fi
            echo "::warning::UPSTREAM benchmark attempt $attempt failed; retrying in 30s"
            sleep 30
          done
          echo "::error::UPSTREAM benchmark failed after 3 attempts"
          exit 1

      - name: Mark UPSTREAM unsupported on ${{ matrix.platform }}
        if: steps.cpu-check.outputs.SKIPPED != 'true' && matrix.os == 'windows'
        shell: bash
        run: |
          mkdir -p target/benchmark-results
          cat > target/benchmark-results/benchmark-result-upstream.json <<EOF
          {
            "platform": "${{ matrix.platform }}",
            "implementation": "upstream",
            "unsupported": true,
            "reason": "com.gliwka.hyperscan:native publishes no windows-x86_64 classifier",
            "benchmarks": []
          }
          EOF

      - name: Skip JMH benchmarks for ${{ matrix.platform }}
        if: steps.cpu-check.outputs.SKIPPED == 'true'
        run: |
          echo "Benchmarks for ${{ matrix.platform }} skipped due to missing CPU features."

      - name: Upload benchmark raw result
        if: always() && steps.cpu-check.outputs.SKIPPED != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark-raw-${{ matrix.platform }}
          path: target/benchmark-results/
          if-no-files-found: warn

      - name: Upload crash logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: crash-logs-${{ matrix.platform }}
          path: |
            hs_err_pid*.log
            target/surefire-reports/*.dumpstream
          if-no-files-found: ignore

  report:
    name: Aggregate performance report
    needs: [smoke, benchmark]
    runs-on: ubuntu-24.04
    outputs:
      fresh: ${{ steps.merge.outputs.count }}
    # smoke gates functional correctness; benchmark cells may flake or skip on
    # missing CPU features, in which case the merge below backfills them with
    # the previous successful run's data (marked stale).
    if: always() && !cancelled() && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')) && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped')
    env:
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - name: Checkout test project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          lfs: false

      - name: Resolve effective native version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.nativeVersion }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(sed -n 's:.*<native\.version>\(.*\)</native\.version>.*:\1:p' pom.xml | head -n1)
          fi
          echo "NATIVE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download all benchmark raw results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: benchmark-raw
          pattern: benchmark-raw-*

      - name: Download previous successful runs' benchmark raw results
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -uo pipefail
          # Backfill cells missing from this run with data from up to the 10 most
          # recent successful runs of this workflow (recency order). AVX-512 and
          # SVE2 runners are scarce enough that several consecutive runs can miss
          # the same cell, so a small depth is not sufficient.
          RUN_IDS=$(gh api "repos/${{ github.repository }}/actions/workflows/smoke-test.yml/runs?per_page=30" \
            --jq '[.workflow_runs[] | select(.conclusion == "success" and .id != ${{ github.run_id }})][0:10][].id')
          PREV_DIRS=""
          for RUN_ID in $RUN_IDS; do
            if gh run download "$RUN_ID" --repo "${{ github.repository }}" \
              -p 'benchmark-raw-*' -D "benchmark-raw-prev-$RUN_ID" 2>/dev/null; then
              PREV_DIRS="$PREV_DIRS benchmark-raw-prev-$RUN_ID"
            fi
          done
          # PREV_DIRS keeps recency order (newest first); do NOT rebuild it via
          # ls, which would re-sort alphabetically and poison the merge with the
          # oldest copy instead of the freshest.
          python3 .github/scripts/merge-benchmark-results.py \
            benchmark-raw \
            benchmark-raw-merged \
            $PREV_DIRS
          # A run that produced zero fresh benchmark results (e.g. a subset
          # re-dispatch whose cells cpu-missed again) must not publish: it would
          # replace a healthy report with an all-stale one. The previous report
          # stays live instead.
          if [ -d benchmark-raw ]; then
            COUNT=$(find benchmark-raw -name '*.json' | wc -l)
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::warning::No fresh benchmark results in this run; keeping the previous report."
          fi

      - name: Generate performance report
        if: steps.merge.outputs.count != '0'
        run: |
          python3 .github/scripts/generate-performance-report.py \
            benchmark-raw-merged \
            target/performance-report/index.html \
            "${NATIVE_VERSION}" \
            "${GITHUB_SHA}"

      - name: Generate performance summary SVG
        if: steps.merge.outputs.count != '0'
        run: |
          python3 .github/scripts/generate-performance-svg.py \
            benchmark-raw-merged \
            target/performance-report/performance-summary.svg \
            "${NATIVE_VERSION}" \
            "${GITHUB_SHA}"

      - name: Generate per-scenario SVGs
        if: steps.merge.outputs.count != '0'
        run: |
          python3 .github/scripts/generate-performance-svg.py \
            benchmark-raw-merged \
            target/performance-report/scenarios/ \
            "${NATIVE_VERSION}" \
            "${GITHUB_SHA}"

      - name: Delete previous performance-report artifacts
        if: steps.merge.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name == "performance-report") | .id' \
          | while read -r ARTIFACT_ID; do
              [ -z "$ARTIFACT_ID" ] && continue
              echo "Deleting previous performance-report artifact id=$ARTIFACT_ID"
              gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID" >/dev/null
            done

      - name: Upload performance report
        if: steps.merge.outputs.count != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: performance-report
          path: target/performance-report/
          if-no-files-found: error

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/master' && steps.merge.outputs.count != '0'
        uses: actions/configure-pages@v6

      - name: Delete previous github-pages artifacts
        if: github.ref == 'refs/heads/master' && steps.merge.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # upload-pages-artifact@v5 requires the artifact to be named exactly
          # 'github-pages'. When this workflow is re-run (manually via UI or
          # automatically), previous attempts' artifacts persist and cause
          # deploy-pages to fail with "Multiple artifacts named 'github-pages'".
          # Clean up any leftover github-pages artifacts belonging to this run
          # before uploading a fresh one.
          gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id' \
          | while read -r ARTIFACT_ID; do
              [ -z "$ARTIFACT_ID" ] && continue
              echo "Deleting previous github-pages artifact id=$ARTIFACT_ID"
              gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID" >/dev/null
            done

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master' && steps.merge.outputs.count != '0'
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/performance-report/

  retry-dispatch:
    name: Re-dispatch on missing CPU features
    needs: [smoke, benchmark]
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check whether any matrix cell hit a CPU feature miss
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Only auto-retry from push-triggered runs. Manual workflow_dispatch and
          # already-re-dispatched runs should not trigger another.
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Not a push-triggered run (event_name=${{ github.event_name }}); skipping retry."
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Detect CPU feature misses by listing this run's jobs and looking for
          # any whose Run-tests step was skipped due to a CPU check failure.
          # 'gh run view --log' filters out ::warning:: annotations, so we cannot
          # grep logs; the jobs API surfaces step outcomes instead. Extract the
          # affected platform names so we can re-run only the missing cells.
          # The UPSTREAM step is skipped on Windows BY DESIGN (no upstream
          # windows build) and must not count as a CPU miss.
          MISSING_PLATFORMS=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '[.jobs[] | .steps[]? | select(.conclusion == "skipped") | .name
                 | select(test("^Run smoke tests for ") or test("^Run JMH benchmarks for (JAVACPP|PANAMA) on "))
                 | if test("^Run smoke tests for ") then sub("^Run smoke tests for "; "")
                   else sub("^Run JMH benchmarks for (JAVACPP|PANAMA) on "; "") end]
                 | unique | join(",")')
          if [ -z "$MISSING_PLATFORMS" ]; then
            echo "No CPU feature miss detected in this run; not re-dispatching."
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Detected CPU feature miss on platforms: $MISSING_PLATFORMS"
          echo "missing_platforms=$MISSING_PLATFORMS" >> "$GITHUB_OUTPUT"
          # Cap concurrent in-flight smoke-test runs to prevent runaway re-dispatch.
          # --repo is required because this job is not in a git checkout context.
          INFLIGHT=$(gh run list --repo "${{ github.repository }}" \
            --workflow=smoke-test.yml --limit=20 --json status \
            --jq '[.[] | select(.status == "in_progress" or .status == "queued")] | length')
          if [ "${INFLIGHT:-0}" -gt 4 ]; then
            echo "Too many concurrent smoke-test runs ($INFLIGHT); not re-dispatching."
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_dispatch=true" >> "$GITHUB_OUTPUT"

      - name: Re-dispatch workflow
        if: steps.check.outputs.should_dispatch == 'true'
        run: |
          NATIVE_VERSION="${{ github.event.inputs.nativeVersion }}"
          ARGS=(-f "platforms=${{ steps.check.outputs.missing_platforms }}")
          if [ -n "$NATIVE_VERSION" ]; then
            ARGS+=(-f "nativeVersion=$NATIVE_VERSION")
          fi
          gh workflow run --repo "${{ github.repository }}" smoke-test.yml "${ARGS[@]}"
          echo "Re-dispatch triggered for platforms: ${{ steps.check.outputs.missing_platforms }}"

  deploy:
    name: Deploy performance report to Pages
    needs: report
    runs-on: ubuntu-24.04
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: false
    if: always() && !cancelled() && needs.report.result == 'success' && github.ref == 'refs/heads/master' && needs.report.outputs.fresh != '0'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
